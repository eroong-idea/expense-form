<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지출결의서 - 미스앤미스터㈜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --border: #2a2a2a;
    --bg: #f5f3ee;
    --paper: #fffef9;
    --accent: #1a1a1a;
    --label-bg: #f0ede4;
    --stamp-r: #c0392b;
    --stamp-b: #1a5276;
    --stamp-g: #1e8449;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    color: var(--accent);
  }

  /* ── 툴바 ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--accent);
    padding: 10px 18px;
    border-radius: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar span {
    color: #aaa;
    font-size: 11px;
    letter-spacing: .05em;
    margin-right: 6px;
  }
  .btn {
    padding: 7px 18px;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-print { background: #fff; color: var(--accent); }
  .btn-img   { background: #4a9eff; color: #fff; }
  .btn-clear { background: #555; color: #ccc; }

  /* ── 용지 (A4: 210×297mm → 794×1123px @96dpi) ── */
  .paper {
    background: var(--paper);
    width: 794px;
    min-height: 1123px;
    padding: 40px 45px;
    box-shadow: 0 4px 32px rgba(0,0,0,.15);
    border: 1px solid #ddd;
    position: relative;
  }

  /* ── 메인 테이블 ── */
  table.form {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 12px;
  }
  table.form td {
    border: 1px solid var(--border);
    padding: 4px 6px;
    vertical-align: middle;
    line-height: 1.5;
    word-break: keep-all;
  }
  table.form input[type="text"],
  table.form input[type="date"],
  table.form input[type="number"],
  table.form textarea {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 12px;
    color: var(--accent);
    padding: 0;
    resize: none;
  }
  table.form textarea { min-height: 16px; overflow: hidden; }

  .label-cell {
    background: var(--label-bg);
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    font-size: 11.5px;
    letter-spacing: .03em;
  }

  /* ── 구분 셀렉트 ── */
  .item-cat {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 11.5px;
    color: var(--accent);
    cursor: pointer;
    text-align: center;
    padding: 0 2px;
  }
  .item-cat option { font-size: 12px; }

  /* ── 헤더 ── */
  .header-row td { height: 72px; }
  .title-cell {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    letter-spacing: .12em;
    vertical-align: middle;
  }

  /* ── 결재란 ── */
  .stamp-box {
    width: 60px;
    text-align: center;
    vertical-align: top;
    padding: 0 !important;
  }
  .stamp-inner {
    display: flex;
    flex-direction: column;
    height: 70px;
  }
  .stamp-title {
    background: var(--label-bg);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 0;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .stamp-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  .stamp-area input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 11px;
    text-align: center;
    outline: none;
    color: var(--stamp-b);
    font-weight: 600;
  }

  /* ── 금액 행 ── */
  .amount-row td { height: 42px; }
  .amount-won {
    font-weight: 700;
    font-size: 15px;
    text-align: right;
    padding-right: 8px !important;
    letter-spacing: .02em;
  }
  #amountKor {
    font-size: 12px;
    color: #333;
  }

  /* ── 내역 행 ── */
  .item-row td { height: 65px; }
  .subtotal-row td {
    background: var(--label-bg);
    font-weight: 700;
    text-align: center;
  }
  .total-row td {
    background: #e8e4d8;
    font-weight: 700;
  }

  /* ── 하단 ── */
  .footer-row td {
    text-align: center;
    font-size: 11.5px;
    padding: 6px 8px;
  }
  .date-display {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .05em;
  }
  .recipient-row td { height: 40px; }
  .company-row td {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .2em;
    padding: 6px;
  }

  /* ── 인쇄 ── */
  @media print {
    @page { size: A4; margin: 0; }
    body { background: white; padding: 0; }
    .toolbar { display: none !important; }
    .paper { box-shadow: none; border: none; margin: 0; padding: 40px 45px; width: 794px; min-height: 1123px; }
    table.form input, table.form textarea {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// ── 회사명 변경 ──────────────────────────────
function changeCompany() {
  const val = document.getElementById('companySelect').value.split('|');
  const short = val[0];   // 예: 미스앤미스터(주)
  const spaced = val[1];  // 예: 미 스 앤 미 스 터 주 식 회 사
  document.getElementById('formTitle').textContent = short + ' 지출결의서';
  document.getElementById('companyName').textContent = spaced;
}

// ── 한글 숫자 변환 ──────────────────────────
function toKoreanNumber(n) {
  if (!n || n === 0) return '영';
  const units = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
  const pos   = ['', '십', '백', '천'];
  const bigPos = ['', '만', '억', '조'];
  let result = '';
  let num = Math.abs(Math.floor(n));
  let bigIdx = 0;
  while (num > 0) {
    const chunk = num % 10000;
    if (chunk !== 0) {
      let chunkStr = '';
      let tmp = chunk;
      for (let i = 0; i < 4; i++) {
        const d = tmp % 10;
        if (d !== 0) {
          chunkStr = (d === 1 && i > 0 ? '' : units[d]) + pos[i] + chunkStr;
        }
        tmp = Math.floor(tmp / 10);
      }
      result = chunkStr + bigPos[bigIdx] + result;
    }
    num = Math.floor(num / 10000);
    bigIdx++;
  }
  return result + '원정';
}

// ── 내역 합산 → 일금(한글) + 우측(숫자) 자동 반영 ──
function calcTotal() {
  const amts = document.querySelectorAll('.item-amt');
  let sum = 0;
  amts.forEach(a => { sum += parseInt(a.value) || 0; });
  document.getElementById('totalDisplay').textContent = sum.toLocaleString('ko-KR');
  document.getElementById('amountKor').textContent = sum ? toKoreanNumber(sum) : '';
  document.getElementById('amountNum').textContent  = sum ? sum.toLocaleString('ko-KR') : '';
}

// ── 날짜 표시 ──────────────────────────────
function updateDateDisplay() {
  const d = document.getElementById('expDate').value;
  if (!d) { document.getElementById('dateDisplay').textContent = ''; return; }
  const dt = new Date(d);
  const y = dt.getFullYear(), m = dt.getMonth()+1, day = dt.getDate();
  document.getElementById('dateDisplay').textContent =
    `${y}년 ${m}월 ${day}일`;
}

// ── 이미지 저장 ──────────────────────────────
function saveImage() {
  const paper = document.getElementById('paper');
  // 입력 값을 span으로 치환 (렌더링 정확도)
  html2canvas(paper, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#fffef9',
    logging: false,
  }).then(canvas => {
    const a = document.createElement('a');
    const d = document.getElementById('expDate').value || 'draft';
    a.download = `지출결의서_${d}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

// ── 초기화 ──────────────────────────────────
function clearForm() {
  if (!confirm('입력 내용을 모두 초기화하시겠습니까?')) return;
  document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], textarea')
    .forEach(el => el.value = '');
  document.getElementById('amountKor').textContent = '';
  document.getElementById('amountNum').textContent = '';
  document.getElementById('totalDisplay').textContent = '0';
  document.getElementById('dateDisplay').textContent = '';
}

// ── 초기 날짜 설정 ──────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('expDate').value = today;
  updateDateDisplay();
});
</script>
